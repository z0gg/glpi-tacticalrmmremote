name: Build release archives

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package folder
        run: |
          mkdir -p dist/tacticalrmmremote
          rsync -a                     --exclude '.git'                     --exclude '.github'                     --exclude 'dist'                     --exclude '*.tar.gz'                     --exclude '*.zip'                     ./ dist/tacticalrmmremote/

          sed -i "s/define('PLUGIN_TACTICALRMMREMOTE_VERSION', '[^']*');/define('PLUGIN_TACTICALRMMREMOTE_VERSION', '${{ steps.vars.outputs.version }}');/" dist/tacticalrmmremote/setup.php

      - name: Create tar.gz
        run: |
          cd dist
          tar -czf tacticalrmmremote.tar.gz tacticalrmmremote

      - name: Create zip
        run: |
          cd dist
          zip -qr tacticalrmmremote.zip tacticalrmmremote

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tacticalrmmremote.tar.gz
            dist/tacticalrmmremote.zip
          generate_release_notes: true
